// ── App ───────────────────────────────────────────────────────────────────
function App() {
  const [cols, setCols] = useState(17);
  const [rows, setRows] = useState(22);
  const [bs, setBs] = useState(3);
  const [shapes, _setShapes] = useState([]);
  const historyRef = useRef([]);
  const setShapes = useCallback(updater => {
    _setShapes(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      historyRef.current.push(prev);
      if (historyRef.current.length > 100) historyRef.current.shift();
      return next;
    });
  }, []);
  const undo = useCallback(() => {
    if (historyRef.current.length === 0) return;
    const prev = historyRef.current.pop();
    _setShapes(prev);
    setSelIds(new Set());
  }, []);
  const [selIds, setSelIds] = useState(new Set());
  const [color, setColor] = useState(KONA.find(c=>c.name==="Navy")||KONA[0]);
  const [tool, setTool] = useState("paint");
  const [search, setSearch] = useState("");
  const [grp, setGrp] = useState("All");
  const [customs, setCustoms] = useState([]);
  const [pinned, setPinned] = useState([
    KONA.find(c=>c.name==="White"), KONA.find(c=>c.name==="Black"),
    KONA.find(c=>c.name==="Natural"), KONA.find(c=>c.name==="Navy"),
    KONA.find(c=>c.name==="Scarlet"), KONA.find(c=>c.name==="Mustard"),
  ].filter(Boolean));
  const [preset, setPreset] = useState("Lap / Throw");
  const [backing, setBacking] = useState(null);
  const [binding, setBinding] = useState(null);
  const [qPattern, setQPattern] = useState("none");
  const [qSpacing, setQSpacing] = useState(2);
  const [qColor, setQColor] = useState({ name:"White", hex:"#fff" });
  const [showQ, setShowQ] = useState(true);
  const [confirmClear, setConfirmClear] = useState(false);
  const [savedQuilts, setSavedQuilts] = useState([]);
  const [showSave, setShowSave] = useState(false);
  const [saveName, setSaveName] = useState("");
  const [viewQuilt, setViewQuilt] = useState(null);
  const [showMyQuilts, setShowMyQuilts] = useState(false);
  const [showHints, setShowHints] = useState(false);
  // The library popover doubles as a fabric picker. `picker` is null when
  // closed, otherwise an object describing the active picker config:
  //   { onPick?, onClear?, showMyPalette?, title? }
  // (Empty object => default paint behaviour from the My palette + button.)
  const [picker, setPicker] = useState(null);
  const helpAnchor = useRef(null);
  const libraryAnchorRef = useRef(null);
  const backingRowRef = useRef(null);
  const bindingRowRef = useRef(null);

  const openLibrary = useCallback((anchorRef) => {
    if (anchorRef && anchorRef.current) libraryAnchorRef.current = anchorRef.current;
    setPicker({});
  }, []);

  const openFabricPicker = useCallback((anchorRef, onPick, onClear, title) => {
    if (anchorRef && anchorRef.current) libraryAnchorRef.current = anchorRef.current;
    setPicker({ onPick, onClear, showMyPalette: true, title });
  }, []);

  const closePicker = useCallback(() => setPicker(null), []);

  const handleSwapTriColors = useCallback(() => {
    const sel = shapes.filter(s => selIds.has(s.id));
    const pids = new Set();
    for (const s of sel) if (s.pairId) pids.add(s.pairId);
    if (pids.size === 0) return;
    const colorByPair = new Map();
    for (const s of shapes) if (s.pairId && pids.has(s.pairId)) {
      if (!colorByPair.has(s.pairId)) colorByPair.set(s.pairId, {});
      colorByPair.get(s.pairId)[s.half] = s.color;
    }
    setShapes(p => p.map(s => {
      if (!s.pairId || !pids.has(s.pairId)) return s;
      const c = colorByPair.get(s.pairId);
      return { ...s, color: s.half === 'a' ? c.b : c.a };
    }));
  }, [shapes, selIds, setShapes]);

  const swapDisabled = useMemo(() => {
    if (selIds.size === 0) return true;
    return !shapes.some(s => selIds.has(s.id) && s.type === 'tri' && s.pairId);
  }, [shapes, selIds]);

  useEffect(() => {
    const handleKey = e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey) {
        e.preventDefault();
        undo();
      }
    };
    window.addEventListener('keydown', handleKey);
    return () => window.removeEventListener('keydown', handleKey);
  }, [undo]);

  const [zoom, setZoom] = useState(1);
  const adjustZoom = useCallback(delta => {
    setZoom(z => Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, +(z + delta).toFixed(2))));
  }, []);
  const resetZoom = useCallback(() => setZoom(1), []);

  useEffect(() => {
    const onKey = e => {
      if (!(e.metaKey || e.ctrlKey)) return;
      const tag = e.target.tagName;
      if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') return;
      if (e.key === '=' || e.key === '+') { e.preventDefault(); adjustZoom(+ZOOM_STEP); }
      else if (e.key === '-' || e.key === '_') { e.preventDefault(); adjustZoom(-ZOOM_STEP); }
      else if (e.key === '0') { e.preventDefault(); resetZoom(); }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [adjustZoom, resetZoom]);

  // Dismiss the selection (and its floating toolbar) when the user mouses down
  // anywhere outside the canvas frame, the toolbar itself, popovers, or modals.
  useEffect(() => {
    if (selIds.size === 0) return undefined;
    const onDown = e => {
      const t = e.target;
      if (!(t instanceof Element)) return;
      if (t.closest('.canvas-frame, .selection-toolbar, .popover, .popover-backdrop, .overlay')) return;
      setSelIds(new Set());
    };
    document.addEventListener('mousedown', onDown);
    return () => document.removeEventListener('mousedown', onDown);
  }, [selIds.size]);

  const allColors = useMemo(()=>[...customs,...KONA],[customs]);
  const filtered = useMemo(()=>{
    let l=allColors;
    if(grp!=="All") l=l.filter(c=>c.group===grp);
    if(search.trim()){const q=search.toLowerCase();l=l.filter(c=>c.name.toLowerCase().includes(q)||(c.code&&c.code.includes(q)));}
    return l;
  },[allColors,grp,search]);

  useEffect(()=>{
    setShapes(p=>p.map(s=>({...s,r:Math.min(s.r,rows-1),c:Math.min(s.c,cols-1),h:Math.max(1,Math.min(s.h,rows-Math.min(s.r,rows-1))),w:Math.max(1,Math.min(s.w,cols-Math.min(s.c,cols-1)))})));
    setSelIds(new Set());
  },[rows,cols]);

  const materials = useMemo(()=>{
    const map=new Map();
    const add=(col,amt)=>{if(!col)return;if(!map.has(col.name))map.set(col.name,{...col,count:0});map.get(col.name).count+=amt;};
    for(const s of shapes){
      const area=s.h*s.w;
      if(s.type==='tri') add(s.color,area*0.5);
      else add(s.color,area);
    }
    const items=Array.from(map.values()).map(c=>({...c,...calcYardage(c.count,bs)})).sort((a,b)=>b.count-a.count);
    const total=shapes.reduce((sum,s)=>sum+(s.type==='tri'?s.h*s.w*0.5:s.h*s.w),0);
    return{items,total,possible:rows*cols,yards:items.reduce((s,x)=>s+x.yards,0)};
  },[shapes,bs,rows,cols]);

  const fw=cols*bs, fh=rows*bs;
  const backCalc=useMemo(()=>calcBacking(fw,fh),[fw,fh]);
  const bindCalc=useMemo(()=>calcBinding(fw,fh),[fw,fh]);
  const grandTotal=materials.yards+(backing?backCalc.yards:0)+(binding?bindCalc.yards:0);

  const maxBs = useMemo(() => {
    const p = PRESETS.find(x => x.name === preset);
    if (!p) return 12;
    return Math.max(2, Math.min(12, Math.floor(Math.min(p.w, p.h) / 2)));
  }, [preset]);

  const applyPreset = name => {
    setPreset(name);
    const p = PRESETS.find(x => x.name === name);
    if (!p) return;
    const presetMaxBs = Math.max(2, Math.min(12, Math.floor(Math.min(p.w, p.h) / 2)));
    const v = Math.max(2, Math.min(presetMaxBs, bs));
    if (v !== bs) setBs(v);
    setCols(Math.min(MAX, Math.max(2, Math.round(p.w / v))));
    setRows(Math.min(MAX, Math.max(2, Math.round(p.h / v))));
  };

  const handleBsChange = newBs => {
    const v = Math.max(2, Math.min(maxBs, Math.round(newBs)));
    setBs(v);
    const p = PRESETS.find(x => x.name === preset);
    if (!p) return;
    setCols(Math.min(MAX, Math.max(2, Math.round(p.w / v))));
    setRows(Math.min(MAX, Math.max(2, Math.round(p.h / v))));
  };

  return (
    <div className="app">

      {/* Header */}
      <header>
        <div className="header-left">
          <a className="brand" href="/" aria-label="metime — home">
            <MetimeLogo/>
          </a>
        </div>
        <div className="header-center">
          <PresetPill
            preset={preset}
            fw={fw} fh={fh}
            onApply={applyPreset}/>
        </div>
        <div className="header-right">
          <button
            className="icon-btn"
            onClick={undo}
            disabled={historyRef.current.length === 0}
            title="Undo (⌘Z)">
            <IcUndo/>
          </button>
          {savedQuilts.length>0 && (
            <button className="btn btn-sm" style={{display:'flex',alignItems:'center',gap:5}} onClick={()=>setShowMyQuilts(true)}>
              <IcBook/> My quilts ({savedQuilts.length})
            </button>
          )}
          <button
            className="btn btn-sm"
            onClick={()=>setConfirmClear(true)}
            disabled={shapes.length === 0}
            title="Clear the quilt">
            Clear
          </button>
          <button className="btn btn-sm btn-dark" onClick={()=>{setSaveName('');setShowSave(true);}}>
            Save quilt
          </button>
        </div>
      </header>

      {/* Body */}
      <div className="body">

        {/* Left tool rail */}
        <ToolRail
          tool={tool}
          setTool={setTool}
          onToggleHints={()=>setShowHints(v=>!v)}
          hintsOn={showHints}
          helpRef={helpAnchor}/>

        {/* Center: canvas */}
        <div className="panel" style={{display:'flex',flexDirection:'column',background:'var(--app-bg)'}}>
          <SizeBar
            bs={bs}
            maxBs={maxBs}
            onBsChange={handleBsChange}
            fw={fw} fh={fh}
            cols={cols} rows={rows}/>
          <div style={{flex:1,minHeight:0,position:'relative'}}>
            <GridCanvas cols={cols} rows={rows} shapes={shapes} setShapes={setShapes}
              selIds={selIds} setSelIds={setSelIds}
              tool={tool} selectedColor={color}
              quiltPattern={qPattern} quiltSpacing={qSpacing} quiltColor={qColor} showQuilting={showQ}
              zoom={zoom} pinned={pinned}/>
            {showHints && (
              <div className="hint-overlay">
                <span>Click to select · Drag to marquee</span>
                <span>·</span>
                <span>Shift+click to add/remove</span>
                <span>·</span>
                <span>Arrow keys to move · Delete to remove</span>
                <span>·</span>
                <span>Drag handles to resize · F to flip triangles</span>
              </div>
            )}
          </div>
          <ZoomBar
            zoom={zoom}
            onZoomChange={setZoom}
            onReset={resetZoom}
            onStep={adjustZoom}/>
        </div>

        {/* Right column */}
        <div className="panel" style={{display:'flex',flexDirection:'column'}}>
          <MyPaletteCard
            color={color}
            pinned={pinned}
            setPinned={setPinned}
            setColor={setColor}
            onOpenLibrary={openLibrary}/>
          <FabricRow
            ref={backingRowRef}
            label="Backing"
            fabric={backing}
            detail={backing ? `${backCalc.backingW}"×${backCalc.backingH}" · ${backCalc.widths}w · ${fmtY(backCalc.yards)}` : ''}
            onClick={() => openFabricPicker(
              backingRowRef,
              setBacking,
              backing ? () => setBacking(null) : null,
              'Backing fabric')}/>
          <FabricRow
            ref={bindingRowRef}
            label="Binding"
            fabric={binding}
            detail={binding ? `${bindCalc.strips} strips · ${bindCalc.perimeter}" perim. · ${fmtY(bindCalc.yards)}` : ''}
            onClick={() => openFabricPicker(
              bindingRowRef,
              setBinding,
              binding ? () => setBinding(null) : null,
              'Binding fabric')}/>
          <QuiltPatternBlock
            qPattern={qPattern} setQPattern={setQPattern}
            qSpacing={qSpacing} setQSpacing={setQSpacing}
            qColor={qColor} setQColor={setQColor}
            color={color}
            showQ={showQ} setShowQ={setShowQ}/>
          <MaterialsBlock materials={materials} grandTotal={grandTotal} fmtY={fmtY}/>
          <div style={{borderTop:'1px solid var(--warm-divider-soft)',flex:1,overflowY:'auto'}}>
            <div style={{padding:'10px 16px 4px'}}>
              <div className="label">Quilt top · by color</div>
            </div>
            {materials.items.length===0 ? (
              <div style={{padding:'12px 16px',fontSize:12,color:'var(--warm-placeholder)',fontStyle:'italic'}}>Draw shapes to see your fabric list.</div>
            ) : materials.items.map(item=>(
              <div key={item.name} className="mat-row">
                <div style={{width:26,height:26,background:item.hex,border:'1px solid rgba(46,41,37,0.10)',borderRadius:3,flexShrink:0}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.name}</div>
                  <div style={{fontSize:11,color:'var(--warm-muted)',fontFamily:'var(--font-mono)'}}>{item.count} pcs · {item.strips} strip{item.strips!==1?'s':''}</div>
                </div>
                <div style={{fontSize:14,fontWeight:600,fontVariantNumeric:'tabular-nums',color:'var(--warm-fg)'}}>{fmtY(item.yards)}</div>
              </div>
            ))}
            <div style={{padding:'12px 16px',fontSize:11,color:'var(--warm-placeholder)',lineHeight:1.6}}>
              Assumes 40" WOF, ¼" seam allowance. Backing adds 4" per side. Binding: 2.5" double-fold strips. Add 10–15% for shrinkage.
            </div>
          </div>
        </div>
      </div>

      {/* Library popover. Anchored to whatever invoked it (My palette + or a
          fabric row); doubles as a fabric picker when `picker.onPick` is set. */}
      {picker && libraryAnchorRef.current && (
        <LibraryPopover
          anchorRef={libraryAnchorRef}
          onClose={closePicker}
          search={search} setSearch={setSearch}
          grp={grp} setGrp={setGrp}
          filtered={filtered}
          color={color} setColor={setColor}
          selIds={selIds} setShapes={setShapes}
          customs={customs} setCustoms={setCustoms}
          setPinned={setPinned}
          allColors={allColors}
          pinned={pinned}
          showMyPalette={picker.showMyPalette}
          onPick={picker.onPick}
          onClear={picker.onClear}
          title={picker.title}/>
      )}

      {/* Clear confirm */}
      {confirmClear && (
        <div className="overlay" onClick={()=>setConfirmClear(false)}>
          <div onClick={e=>e.stopPropagation()}
            style={{background:'#FFFFFF',border:'1px solid #E2DDD2',borderRadius:8,padding:24,maxWidth:340,width:'100%',margin:16,boxShadow:'0 8px 32px rgba(46,41,37,0.14)'}}>
            <div style={{fontWeight:400,fontSize:24,marginBottom:8,fontFamily:"var(--font-display)",lineHeight:1.1}}>Clear the quilt?</div>
            <div style={{fontSize:13,color:'#5C544A',marginBottom:20,lineHeight:1.5}}>This will remove all shapes from your design. This cannot be undone.</div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn" onClick={()=>setConfirmClear(false)}>Cancel</button>
              <button className="btn btn-dark" onClick={()=>{setShapes([]);setSelIds(new Set());setConfirmClear(false);}}>Clear all</button>
            </div>
          </div>
        </div>
      )}

      {/* Save dialog */}
      {showSave && (
        <div className="overlay" onClick={()=>setShowSave(false)}>
          <div onClick={e=>e.stopPropagation()}
            style={{background:'#FFFFFF',border:'1px solid #E2DDD2',borderRadius:8,padding:24,maxWidth:380,width:'100%',margin:16,boxShadow:'0 8px 32px rgba(46,41,37,0.14)'}}>
            <div style={{fontWeight:400,fontSize:24,marginBottom:16,fontFamily:"var(--font-display)",lineHeight:1.1}}>Save your quilt</div>
            <input type="text" placeholder="Give your quilt a name…" value={saveName} onChange={e=>setSaveName(e.target.value)}
              autoFocus onKeyDown={e=>{if(e.key==='Enter'&&saveName.trim()){
                const q={id:Date.now(),name:saveName.trim(),shapes:[...shapes],cols,rows,bs,preset,backing,binding,
                  materials:{...materials},fw,fh,backCalc,bindCalc,grandTotal};
                setSavedQuilts(p=>[q,...p]);setShowSave(false);setSaveName('');
              }}}
              style={{marginBottom:16}}/>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn" onClick={()=>setShowSave(false)}>Cancel</button>
              <button className="btn btn-dark" onClick={()=>{
                if(!saveName.trim()) return;
                const q={id:Date.now(),name:saveName.trim(),shapes:[...shapes],cols,rows,bs,preset,backing,binding,
                  materials:{...materials},fw,fh,backCalc,bindCalc,grandTotal};
                setSavedQuilts(p=>[q,...p]);setShowSave(false);setSaveName('');
              }}>Save</button>
            </div>
          </div>
        </div>
      )}

      {/* My quilts list */}
      {showMyQuilts && (
        <div className="overlay" onClick={()=>setShowMyQuilts(false)}>
          <div onClick={e=>e.stopPropagation()}
            style={{background:'#FFFFFF',border:'1px solid #E2DDD2',borderRadius:8,padding:24,maxWidth:500,width:'100%',margin:16,boxShadow:'0 8px 32px rgba(46,41,37,0.14)',maxHeight:'80vh',overflowY:'auto'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
              <div style={{fontWeight:400,fontSize:24,fontFamily:"var(--font-display)",lineHeight:1.1}}>My quilts</div>
              <button onClick={()=>setShowMyQuilts(false)} style={{background:'none',border:'none',cursor:'pointer',color:'#8A8580',display:'flex'}}><IcX/></button>
            </div>
            {savedQuilts.length===0 ? (
              <div style={{fontSize:13,color:'#CFC9BE',fontStyle:'italic',padding:'20px 0',textAlign:'center'}}>No saved quilts yet</div>
            ) : (
              <div style={{display:'flex',flexDirection:'column',gap:12}}>
                {savedQuilts.map(q=>(
                  <div key={q.id} style={{display:'flex',gap:12,alignItems:'center',padding:12,border:'1px solid #E2DDD2',borderRadius:6,cursor:'pointer',transition:'background .1s'}}
                    onClick={()=>{setViewQuilt(q);setShowMyQuilts(false);}}
                    onMouseEnter={e=>e.currentTarget.style.background='#EFE9DD'}
                    onMouseLeave={e=>e.currentTarget.style.background='#FFFFFF'}>
                    <div style={{width:64,height:64,flexShrink:0,position:'relative',background:'#FFFFFF',borderRadius:4,overflow:'hidden'}}>
                      <svg viewBox={`0 0 ${q.cols} ${q.rows}`} width="64" height="64" preserveAspectRatio="xMidYMid meet">
                        {q.shapes.map((s,i)=>s.type==='tri'?(
                          <polygon key={i} points={s.dir==='/'?(s.half==='a'?`${s.c},${s.r} ${s.c+s.w},${s.r} ${s.c},${s.r+s.h}`:`${s.c+s.w},${s.r} ${s.c+s.w},${s.r+s.h} ${s.c},${s.r+s.h}`):(s.half==='a'?`${s.c},${s.r} ${s.c+s.w},${s.r} ${s.c+s.w},${s.r+s.h}`:`${s.c},${s.r} ${s.c},${s.r+s.h} ${s.c+s.w},${s.r+s.h}`)} fill={s.color.hex}/>
                        ):<rect key={i} x={s.c} y={s.r} width={s.w} height={s.h} fill={s.color.hex} stroke="rgba(46,41,37,0.08)" strokeWidth="0.05"/>)}
                      </svg>
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:500,fontSize:14,marginBottom:2}}>{q.name}</div>
                      <div style={{fontSize:12,color:'#8A8580'}}>{q.fw}" × {q.fh}" · {q.preset !== 'Custom' ? q.preset : 'Custom size'}</div>
                      <div style={{fontSize:12,color:'#B5AFA6'}}>{q.materials.items.length} color{q.materials.items.length!==1?'s':''} · {fmtY(q.grandTotal)} total</div>
                    </div>
                    <i className="iconoir-nav-arrow-right" style={{fontSize:18,color:'#CFC9BE'}}/>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      )}

      {/* Quilt preview */}
      {viewQuilt && (()=>{
        const q = viewQuilt;
        const allItems = [
          ...q.materials.items.map(m=>({type:'Quilt top',name:m.name,hex:m.hex,detail:`${m.count} pcs · ${m.strips} strip${m.strips!==1?'s':''}`,yards:m.yards})),
          ...(q.backing ? [{type:'Backing',name:q.backing.name,hex:q.backing.hex,detail:`${q.backCalc.backingW}"×${q.backCalc.backingH}" · ${q.backCalc.widths}w`,yards:q.backCalc.yards}] : []),
          ...(q.binding ? [{type:'Binding',name:q.binding.name,hex:q.binding.hex,detail:`${q.bindCalc.strips} strips · ${q.bindCalc.perimeter}" perim.`,yards:q.bindCalc.yards}] : []),
        ];
        return (
          <div className="overlay" onClick={()=>setViewQuilt(null)}>
            <div onClick={e=>e.stopPropagation()}
              style={{background:'#FFFFFF',border:'1px solid #E2DDD2',borderRadius:8,maxWidth:720,width:'100%',margin:16,boxShadow:'0 8px 32px rgba(46,41,37,0.14)',maxHeight:'90vh',overflowY:'auto'}}>

              {/* Top bar */}
              <div style={{padding:'20px 24px 16px',borderBottom:'1px solid #EFE9DD',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <div>
                  <div style={{fontWeight:400,fontSize:24,fontFamily:"var(--font-display)",lineHeight:1.1}}>{q.name}</div>
                  <div style={{fontSize:13,color:'#8A8580',marginTop:2}}>{q.fw}" × {q.fh}" · {q.preset !== 'Custom' ? q.preset : 'Custom size'} · {q.bs}" blocks</div>
                </div>
                <button onClick={()=>setViewQuilt(null)} style={{background:'none',border:'none',cursor:'pointer',color:'#8A8580',display:'flex'}}><IcX/></button>
              </div>

              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:0}}>
                {/* Preview */}
                <div style={{padding:24,borderRight:'1px solid #EFE9DD',display:'flex',alignItems:'center',justifyContent:'center'}}>
                  <div style={{width:'100%',maxWidth:320,background:'#FFFFFF',borderRadius:4,overflow:'hidden',border:'1px solid #E2DDD2'}}>
                    <svg viewBox={`0 0 ${q.cols} ${q.rows}`} width="100%" preserveAspectRatio="xMidYMid meet" style={{display:'block'}}>
                      <rect width={q.cols} height={q.rows} fill="#FFFFFF"/>
                      {Array.from({length:q.cols+1},(_,i)=><line key={`v${i}`} x1={i} y1={0} x2={i} y2={q.rows} stroke="#EFE9DD" strokeWidth="0.04"/>)}
                      {Array.from({length:q.rows+1},(_,i)=><line key={`h${i}`} x1={0} y1={i} x2={q.cols} y2={i} stroke="#EFE9DD" strokeWidth="0.04"/>)}
                      {q.shapes.map((s,i)=>s.type==='tri'?(
                        <polygon key={i} points={s.dir==='/'?(s.half==='a'?`${s.c},${s.r} ${s.c+s.w},${s.r} ${s.c},${s.r+s.h}`:`${s.c+s.w},${s.r} ${s.c+s.w},${s.r+s.h} ${s.c},${s.r+s.h}`):(s.half==='a'?`${s.c},${s.r} ${s.c+s.w},${s.r} ${s.c+s.w},${s.r+s.h}`:`${s.c},${s.r} ${s.c},${s.r+s.h} ${s.c+s.w},${s.r+s.h}`)} fill={s.color.hex}/>
                      ):<rect key={i} x={s.c} y={s.r} width={s.w} height={s.h} fill={s.color.hex} stroke="rgba(46,41,37,0.08)" strokeWidth="0.05"/>)}
                    </svg>
                  </div>
                </div>

                {/* Supplies list */}
                <div style={{display:'flex',flexDirection:'column'}}>
                  <div style={{padding:'16px 20px 8px'}}>
                    <div className="label" style={{marginBottom:4}}>Supplies list</div>
                    <div style={{fontSize:12,color:'#8A8580'}}>{allItems.length} item{allItems.length!==1?'s':''}</div>
                  </div>
                  <div style={{flex:1,overflowY:'auto',maxHeight:320}}>
                    {allItems.map((item,i)=>(
                      <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 20px',borderBottom:'1px solid #EFE9DD'}}>
                        <div style={{width:24,height:24,background:item.hex,border:'1px solid rgba(46,41,37,0.10)',borderRadius:3,flexShrink:0}}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:12,fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.name}</div>
                          <div style={{fontSize:11,color:'#8A8580'}}>{item.type} · {item.detail}</div>
                        </div>
                        <div style={{fontSize:13,fontWeight:600,fontVariantNumeric:'tabular-nums',whiteSpace:'nowrap'}}>{fmtY(item.yards)}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{padding:'12px 20px',borderTop:'1px solid #EFE9DD',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                    <div>
                      <div style={{fontSize:11,color:'#8A8580'}}>Grand total</div>
                      <div style={{fontSize:20,fontWeight:600,fontVariantNumeric:'tabular-nums'}}>{fmtY(q.grandTotal)}</div>
                    </div>
                    <button className="btn btn-dark" style={{display:'flex',alignItems:'center',gap:6,padding:'10px 20px',fontSize:13}}
                      onClick={()=>alert('Add to cart coming soon — Shopify integration pending!')}>
                      <i className="iconoir-cart" style={{fontSize:16}}/> Add to cart
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

// ── Tweaks ────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "borderColor": "#2E2925",
  "borderWidth": "1",
  "appBg": "#F5F3EE",
  "canvasBg": "#FFFFFF",
  "radius": "4"
}/*EDITMODE-END*/;

function applyTweaks(t) {
  const b = `${t.borderWidth}px solid ${t.borderColor}`;
  const root = document.documentElement;
  root.style.setProperty('--div-border', b);
  root.style.setProperty('--app-bg', t.appBg);
  root.style.setProperty('--canvas-bg', t.canvasBg);
  let s = document.getElementById('_tweak_s');
  if (!s) { s = document.createElement('style'); s.id = '_tweak_s'; document.head.appendChild(s); }
  s.textContent = `.btn, input[type=text], select, .chip { border-radius: ${t.radius}px !important; } .pill { border-radius: 2px !important; } body { background: ${t.appBg}; }`;
}

function TweaksPanel() {
  const [open, setOpen] = React.useState(false);
  const [t, setT] = React.useState(TWEAK_DEFAULTS);

  React.useEffect(() => {
    applyTweaks(TWEAK_DEFAULTS);
    const handler = (e) => {
      if (e.data && e.data.type === '__activate_edit_mode') setOpen(true);
      if (e.data && e.data.type === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const set = (key, val) => {
    const next = { ...t, [key]: val };
    setT(next);
    applyTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  if (!open) return null;

  const Row = ({ label, children }) => (
    <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:10 }}>
      <span style={{ fontSize:11, color:'#5C544A' }}>{label}</span>
      {children}
    </div>
  );

  return (
    <div style={{
      position:'fixed', bottom:16, right:16, zIndex:200,
      background:'#FFFFFF', border:'1px solid #2E2925', borderRadius:4,
      padding:'14px 16px', width:230,
      boxShadow:'0 4px 20px rgba(46,41,37,0.12)',
      fontFamily:"var(--font-sans)",
    }}>
      <div style={{ fontSize:11, fontWeight:600, marginBottom:14, letterSpacing:'0.08em', textTransform:'uppercase', color:'#2E2925' }}>Tweaks</div>

      <Row label="Border color">
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <input type="color" value={t.borderColor} onChange={e=>set('borderColor',e.target.value)}
            style={{ width:28, height:24, padding:2, border:'1px solid #E2DDD2', borderRadius:3, cursor:'pointer', background:'none' }}/>
          <span style={{ fontSize:10, fontFamily:"'JetBrains Mono', ui-monospace, monospace", color:'#B5AFA6' }}>{t.borderColor}</span>
        </div>
      </Row>

      <Row label="Border width">
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <input type="range" min={0} max={4} step={0.5} value={t.borderWidth} onChange={e=>set('borderWidth',e.target.value)}
            style={{ width:80, accentColor:'#2E2925' }}/>
          <span style={{ fontSize:10, fontFamily:"'JetBrains Mono', ui-monospace, monospace", color:'#B5AFA6', minWidth:28 }}>{t.borderWidth}px</span>
        </div>
      </Row>

      <Row label="Corner radius">
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <input type="range" min={0} max={12} step={1} value={t.radius} onChange={e=>set('radius',e.target.value)}
            style={{ width:80, accentColor:'#2E2925' }}/>
          <span style={{ fontSize:10, fontFamily:"'JetBrains Mono', ui-monospace, monospace", color:'#B5AFA6', minWidth:28 }}>{t.radius}px</span>
        </div>
      </Row>

      <Row label="Background">
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <input type="color" value={t.appBg} onChange={e=>set('appBg',e.target.value)}
            style={{ width:28, height:24, padding:2, border:'1px solid #E2DDD2', borderRadius:3, cursor:'pointer', background:'none' }}/>
          <span style={{ fontSize:10, fontFamily:"'JetBrains Mono', ui-monospace, monospace", color:'#B5AFA6' }}>{t.appBg}</span>
        </div>
      </Row>

      <Row label="Canvas bg">
        <div style={{ display:'flex', alignItems:'center', gap:6 }}>
          <input type="color" value={t.canvasBg} onChange={e=>set('canvasBg',e.target.value)}
            style={{ width:28, height:24, padding:2, border:'1px solid #E2DDD2', borderRadius:3, cursor:'pointer', background:'none' }}/>
          <span style={{ fontSize:10, fontFamily:"'JetBrains Mono', ui-monospace, monospace", color:'#B5AFA6' }}>{t.canvasBg}</span>
        </div>
      </Row>

      <button onClick={()=>{ setT(TWEAK_DEFAULTS); applyTweaks(TWEAK_DEFAULTS); }}
        style={{ marginTop:6, width:'100%', padding:'5px 0', fontSize:11, background:'none', border:'1px solid #E2DDD2', borderRadius:4, cursor:'pointer', color:'#8A8580', fontFamily:"var(--font-sans)" }}>
        Reset defaults
      </button>
    </div>
  );
}

function Root() {
  return (
    <>
      <App/>
      <TweaksPanel/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Root/>);
</script>
</body>
</html>
